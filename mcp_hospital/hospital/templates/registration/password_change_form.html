<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - AVM Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .change-card {
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .btn-primary {
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            transition: all 0.3s;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            margin-bottom: 10px;
            width: 100%;
        }

        .helptext {
            font-size: 0.75rem;
            color: #6c757d;
            display: block;
            margin-top: -5px;
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .errorlist {
            color: #dc3545;
            font-size: 0.8rem;
            list-style: none;
            padding-left: 0;
            margin-bottom: 10px;
        }

        p label {
            font-weight: 600;
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="change-card">
        <div class="text-center mb-4">
            <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex align-items-center justify-content-center"
                style="width: 80px; height: 80px;">
                <i class="bi bi-shield-lock-fill fs-1"></i>
            </div>
            <h2 class="fw-bold mt-3">Change Password</h2>
            <p class="text-muted small">Update your secure portal password</p>
        </div>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type|default:'password' }}" name="{{ field.name }}"
                    class="form-control" required>
                {% if field.help_text %}
                <span class="helptext">{{ field.help_text|safe }}</span>
                {% endif %}
                {% if field.errors %}
                <div class="errorlist">{{ field.errors }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100 mt-2">Update Password</button>
            <div class="text-center mt-3">
                <a href="{% url 'dashboard' %}" class="btn btn-link btn-sm text-decoration-none text-muted">Cancel</a>
            </div>
        </form>
    </div>
</body>

</html>

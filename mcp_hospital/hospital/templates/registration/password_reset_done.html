<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent - AVM Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .done-card {
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .btn-primary {
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="done-card text-center">
        <div class="mb-4">
            <div class="bg-success-subtle text-success rounded-circle d-inline-flex align-items-center justify-content-center"
                style="width: 80px; height: 80px;">
                <i class="bi bi-envelope-check-fill fs-1"></i>
            </div>
        </div>
        <h2 class="fw-bold mb-3">Check Your Inbox</h2>
        <p class="text-muted mb-4 small">We've emailed you instructions for setting your password. You should receive it
            shortly.</p>
        <p class="text-muted  small mb-4">If you don't receive an email, please make sure you've entered the address you
            registered with.</p>
        <a href="{% url 'login' %}" class="btn btn-primary w-100">Back to Login</a>
    </div>
</body>

</html>

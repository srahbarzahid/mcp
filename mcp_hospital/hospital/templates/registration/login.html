<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AVM Hospital</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }

        .hospital-logo {
            width: 60px;
            height: 60px;
            background: var(--primary-color);
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .login-body {
            padding: 40px;
        }

        .form-label {
            font-weight: 600;
            color: #475569;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: white;
        }

        .btn-login {
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        .auth-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
        }

        .error-alert {
            background-color: #fee2e2;
            color: #b91c1c;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.85rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        /* Styling for Django-rendered inputs */
        input[type="text"],
        input[type="password"] {
            width: 100%;
            display: block;
            border-radius: 12px;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .password-toggle-wrapper {
            position: relative;
        }

        .password-toggle-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            font-size: 1.2rem;
            transition: color 0.3s;
            z-index: 10;
        }

        .password-toggle-wrapper i:hover {
            color: var(--primary-color);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="login-header">
            <div class="hospital-logo">
                <i class="bi bi-hospital fs-2"></i>
            </div>
            <h2 class="fw-bold mb-1">AVM Hospital</h2>
            <p class="mb-0 opacity-75 small">Secure Practitioner & Patient Portal</p>
        </div>

        <div class="login-body">
            {% if form.errors %}
            <div class="error-alert">
                <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
                <div>Invalid username or password. Please try again.</div>
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="id_username" class="form-label">Username</label>
                    {{ form.username }}
                </div>
                <div class="mb-4">
                    <label for="id_password" class="form-label">Password</label>
                    <div class="password-toggle-wrapper">
                        {{ form.password }}
                        <i class="bi bi-eye" id="togglePassword"></i>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label small text-muted" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="{% url 'password_reset' %}" class="small text-primary text-decoration-none fw-bold">Forgot
                        Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-login w-100">
                    Sign In <i class="bi bi-arrow-right-short ms-1"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p class="text-muted small mb-0">Don't have an account?
                    <a href="{% url 'signup' %}" class="text-primary fw-bold text-decoration-none">Create Account</a>
                </p>
                <div class="mt-4">
                    <a href="{% url 'home' %}" class="btn btn-link btn-sm text-muted text-decoration-none">
                        <i class="bi bi-house-door me-1"></i> Return to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordField = document.querySelector('input[type="password"]');

        if (togglePassword && passwordField) {
            togglePassword.addEventListener('click', function () {
                // toggle the type attribute
                const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordField.setAttribute('type', type);

                // toggle the eye icon
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        }
    </script>

</body>

</html>
